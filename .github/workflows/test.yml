name: API Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run smoke tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://dummyjson.com' }}
          DEFAULT_TIMEOUT: ${{ vars.DEFAULT_TIMEOUT || '10' }}
        run: |
          pytest -m smoke --tb=short -v

  full:
    name: Full Test Suite
    runs-on: ubuntu-latest
    needs: smoke

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run all tests
        env:
          BASE_URL: ${{ vars.BASE_URL || 'https://dummyjson.com' }}
          DEFAULT_TIMEOUT: ${{ vars.DEFAULT_TIMEOUT || '10' }}
        run: |
          pytest --tb=short -v